name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -x
            echo "WHO AM I"
            whoami

            echo "WHERE AM I"
            pwd

            echo "HOME CONTENT"
            ls -la /home/deploy || true

            echo "SCRIPTS"
            ls -la /home/deploy/scripts || true
            cat /home/deploy/scripts/d.sh

            echo "RUN SCRIPT"
            bash -x /home/deploy/scripts/d.sh