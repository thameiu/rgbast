events {}

http {
  server {
    listen 80;
    server_name api.rgbast.com;

    # redirection HTTP → HTTPS
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name api.rgbast.com;

    ssl_certificate /etc/letsencrypt/live/api.rgbast.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.rgbast.com/privkey.pem;

    # CORS fallback at edge so browser still receives CORS headers on upstream errors.
    add_header Access-Control-Allow-Origin "$http_origin" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Vary "Origin" always;

    if ($request_method = OPTIONS) {
      return 204;
    }

    location / {
      proxy_pass http://web:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}