events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 80;
    server_name api.rgbast.com rgbast.com www.rgbast.com;

    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name api.rgbast.com;

    ssl_certificate /etc/letsencrypt/live/api.rgbast.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.rgbast.com/privkey.pem;

    add_header Access-Control-Allow-Origin "$http_origin" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Vary "Origin" always;

    if ($request_method = OPTIONS) {
      return 204;
    }

    location ~ ^/color/palette/from-image/?$ {
      client_max_body_size 10M;

      proxy_pass http://web:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Credentials;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Max-Age;
      proxy_hide_header Vary;
    }

    location / {
      proxy_pass http://web:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Credentials;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Max-Age;
      proxy_hide_header Vary;
    }
  }

  server {
    listen 443 ssl;
    server_name rgbast.com www.rgbast.com;

    ssl_certificate /etc/letsencrypt/live/rgbast.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rgbast.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}